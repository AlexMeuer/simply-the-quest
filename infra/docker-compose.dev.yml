services:
  app:
    image: oven/bun:latest
    working_dir: /app
    volumes:
      - ../remix:/app
      - app_node_modules:/app/node_modules
      - bun_cache:/root/.bun
    command: sh -c "bun install && bun run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - neo4j
      - minio
      - meilisearch

  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/devpassword
    volumes:
      - neo4j-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p devpassword 'RETURN 1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: devminio
      MINIO_ROOT_PASSWORD: devminiosecret
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:latest
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: devmeili
      MEILI_NO_ANALYTICS: true
    volumes:
      - meili-data:/meili_data

  # One-shot init to create bucket + enable versioning + set CORS
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./minio.cors.xml:/cors.xml:ro
      - ./minio.init.sh:/init.sh:ro
    entrypoint: ["/bin/sh"]
    command: "/init.sh"
    restart: "no"

volumes:
  neo4j-data:
  meili-data:
  minio-data:
  app_node_modules:
  bun_cache:
