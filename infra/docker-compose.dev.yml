services:
  app:
    image: oven/bun:latest
    working_dir: /app
    volumes:
      - ../remix:/app
      - app_node_modules:/app/node_modules
      - bun_cache:/root/.bun
    command: sh -c "bun install && bun run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - neo4j
      - minio
      - meilisearch

  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: devminio
      MINIO_ROOT_PASSWORD: devminiosecret
    command: server /data

  meilisearch:
    image: getmeili/meilisearch:latest
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: devmeili
      MEILI_NO_ANALYTICS: true

volumes:
  neo4j-data:
  meili-data:
  minio-data:
  app_node_modules:
  bun_cache:
