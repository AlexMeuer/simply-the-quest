services:
  # ──────────────────────────────  PostgreSQL + pgmq  ──────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres # TODO: Avoid secrets in env vars.
      POSTGRES_DB: simplythequest
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  # ──────────────────────────────  Neo4j  ──────────────────────────────────────
  neo4j:
    image: neo4j:2025
    environment:
      NEO4J_AUTH: "neo4j/password"
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "7474:7474" # Browser
      - "7687:7687" # Bolt
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      retries: 5

  # ──────────────────────────────  MinIO ───────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Admin console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      retries: 3

  # ──────────────────────────────  Web app (Remix)  ────────────────────────────
  web:
    build:
      context: .
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/simplythequest
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASS: password
      MINIO_ENDPOINT: http://minio:9000
      MINIO_KEY: minio
      MINIO_SECRET: minio123
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports: ["3000:3000"]

  # ──────────────────────────────  Sync worker  ────────────────────────────────
  worker:
    build:
      context: .
    command: bun run scripts/graph-worker.ts
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/simplythequest
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASS: password
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

volumes:
  pgdata:
  neo4jdata:
  miniodata:
